services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://72.61.237.41:8000
    depends_on:
      - backend
    restart: always
    networks:
      - erp_network

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/account_system

      # 👇 IMPORTANT: CORS config for FastAPI
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000,http://72.61.237.41:3000
    depends_on:
      - postgres
    restart: always
    networks:
      - erp_network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: account_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - erp_network

volumes:
  postgres_data:

networks:
  erp_network:
    driver: bridge